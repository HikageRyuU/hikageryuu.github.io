<body>
<div id="garps" class="container" style="width: 100%; height: 600px; border-radius: 16px; border: 4px solid #121314; box-sizing: border-box;">
<script>
    // 初始化图表
    var chart = echarts.init(document.getElementById('garps'), 'white', {renderer: 'canvas'});
    var chartDom = document.getElementById('garps');
    chartDom.addEventListener('touchmove', function(e) {
      e.preventDefault(); 
    }, { passive: false }); 

    chartDom.style.touchAction = 'none';

    // 配置项
    var option = {
        tooltip: {
            trigger: 'item',
            padding: [4, 8],
            formatter: function (params) {
                if (params.dataType === 'node') {
                    return `<div style="color:#fff"><p style="margin:0 0 3px 0">姓名：${params.name}</p><p style="margin:0">点击跳转详情</p></div>`;
                }
            }
        },
        grid: {
            left: '10%',
            top: 60,
            right: '10%',
            bottom: 60,
        },
        toolbox: {
            feature: {
                restore: {title: '重置视图'}, 
            }
        },
        series: [{
            type: 'graph',
            layout: 'force',
            emphasis: {scale: 1.2},
            force: {
                repulsion: 600, // 斥力
                edgeLength: 230, // 边长
                layoutAnimation: true,
            },
            symbolSize: [50, 50], // 头像宽高
            nodeScaleRatio: 1,
            roam: true,
            draggable: true,
            focusNodeAdjacency: true,
            edgeSymbol: ['circle', 'arrow'],
            edgeSymbolSize: [4, 10], // 调整边两端标记大小
            label: {
                normal: {
                    show: true,
                    position: 'bottom', 
                    color: 'lightblue', 
                    fontSize: 14,
                    fontWeight: 'bold'
                }
            },
            edgeLabel: {
                normal: {
                    show: true,
                    textStyle: {fontSize: 12, color: '#fff'},
                    formatter: "{c}",
                    backgroundColor: 'rgba(0,40,58,0.7)', // 关系文字背景
                    padding: [2, 6]
                }
            },
            categories: [ // 分类
                {name: '主角'},
                {name: '配角'}
            ],
            itemStyle: {
                normal: {
                    borderColor: '#02162b',
                    borderWidth: 2,
                    shadowBlur: 9,
                    shadowColor: '#00283a',
                }
            },
            lineStyle: {
                normal: {
                    opacity: 0.9,
                    width: 2,
                    color: {
                        type: 'linear',
                        x: 0, y: 0, x2: 0, y2: 1,
                        colorStops: [{offset: 0, color: '#4FC1DE'}, {offset: 1, color: '#73D9C4'}],
                        globalCoord: false
                    }
                }
            },
            symbolKeepAspect: true, // 保持图片比例
            // 节点数据
            data: [
                {id: 'cmb', name: '崇木表', category: 0, 
                 link: '/2024/01/31/takakiomote', 
                 symbol: ''}, 
                {id: 'mtl', name: '墨涕零', category: 1, 
                 link: '/2024/07/21/motiling/', 
                 symbol: ''},
                {id: 'pl', name: '？？？', category: 1, 
                 link: '/2024/07/24/pili/', 
                 symbol: ''},
                {id: 'bin', name: '津久井荒濑', category: 1, 
                 link: '/2024/07/21/migiwa/', 
                 symbol: ''},
                {id: 'tszmq', name: '笹沼真琴', category: 1, 
                 link: '', 
                 symbol: ''}
            ],
            // 关系数据
            links: [
                {source: 'cmb', target: 'mtl', value: '朋友'},
                {source: 'cmb', target: 'pl', value: '死党'},
                {source: 'cmb', target: 'bin', value: '恋人'},
                {source: 'cmb', target: 'tszmq', value: '失踪的姐姐'},
                {source: 'mtl', target: 'cmb', value: '朋友'},
                {source: 'mtl', target: 'pl', value: '恋人'},
                {source: 'mtl', target: 'bin', value: '朋友'},
                {source: 'pl', target: 'cmb', value: '朋友&暗恋'},
                {source: 'pl', target: 'mtl', value: '炮友'},
                {source: 'pl', target: 'bin', value: '可怕的家伙'},
                {source: 'bin', target: 'cmb', value: '恋人'},
                {source: 'bin', target: 'mtl', value: '朋友'},
                {source: 'bin', target: 'pl', value: '认识'}
            ]
        }]
    };

    (function handleParallelEdges() {
        const links = option.series[0].links;
        const edgeMap = new Map();
        const BASE_CURVE = 0.12; // 曲率
        
        links.forEach(link => {
            const s = String(link.source);
            const t = String(link.target);
            const key = [s, t].sort().join('|');
            if (!edgeMap.has(key)) edgeMap.set(key, []);
            edgeMap.get(key).push(link);
        });

        edgeMap.forEach((edgeList) => {
            const count = edgeList.length;
            if (count === 1) {
                const link = edgeList[0];
                if (!link.lineStyle) link.lineStyle = {};
                if (!link.lineStyle.normal) link.lineStyle.normal = {};
                link.lineStyle.normal.curveness = 0;
                return;
            }

            const isMutualSame = count === 2 && edgeList[0].value === edgeList[1].value;

            edgeList.forEach((link, index) => {
                if (!link.lineStyle) link.lineStyle = {};
                if (!link.lineStyle.normal) link.lineStyle.normal = {};
                if (!link.edgeLabel) link.edgeLabel = {};
                if (!link.edgeLabel.normal) link.edgeLabel.normal = {};

                if (isMutualSame) {
                    link.lineStyle.normal.curveness = 0;
                    
                    if (index === 0) {
                        link.edgeLabel.normal.show = true;
                        link.edgeLabel.normal.position = 'middle'; 
                    } else {
                        link.edgeLabel.normal.show = false;
                    }
                } else {
                    link.lineStyle.normal.curveness = BASE_CURVE * (index + 1);
                    link.edgeLabel.normal.position = 'top';
                    link.edgeLabel.normal.distance = 5 + (index * 6);
                    link.edgeLabel.normal.show = true;
                }
            });
        });
    })();

    chart.setOption(option);

    // 节点点击跳转
    chart.on('click', function (params) {
        if (params.dataType === 'node' && params.data.link) {
            window.open(params.data.link, '_blank');
        }
    });

    // 自适应窗口大小
    window.addEventListener('resize', function() {
        chartDom.style.height = (window.innerHeight - 100) + 'px';
        chart.resize();
    });

    const params = new URLSearchParams(location.search)
    const id = params.get('focus')
    id && setTimeout(()=>{
      chart.dispatchAction({type:'focusNodeAdjacency',dataIndex:option.series[0].data.findIndex(i=>i.id==id)})
    },500)
</script>
